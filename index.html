<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --card:#1c2128; --hover:#21262d;
  --border:#30363d; --border-l:#21262d;
  --t1:#e6edf3; --t2:#8b949e; --t3:#484f58;
  --blue:#1a9fff; --green:#3fb950; --orange:#d29922; --purple:#bc8cff; --red:#f85149;
  --c-read:#58a6ff; --c-sport:#3fb950; --c-lang:#d1a366; --c-code:#bc8cff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;}

/* ── ONBOARDING ── */
#onboard{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);overflow-y:auto;padding:20px 0;}

.banner-wrap{width:100%;max-width:520px;padding:0 20px;margin-bottom:24px;}
.banner-track{position:relative;height:190px;border-radius:16px;overflow:hidden;}
.bslide{position:absolute;inset:0;display:flex;align-items:center;gap:20px;padding:24px 28px;border-radius:16px;border:1px solid var(--border);opacity:0;transform:translateX(36px);transition:all .5s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.bslide.active{opacity:1;transform:translateX(0);pointer-events:all;}
.bslide.exit{opacity:0;transform:translateX(-36px);}
.bs-art{font-size:64px;flex-shrink:0;}
.bs-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
.bs-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;line-height:1.2;margin-bottom:6px;}
.bs-desc{font-size:13px;color:var(--t2);line-height:1.5;}
.s0{background:linear-gradient(135deg,#0d2137,#0a1520);} .s0 .bs-tag{color:var(--blue);}
.s1{background:linear-gradient(135deg,#0e2318,#091510);} .s1 .bs-tag{color:var(--green);}
.s2{background:linear-gradient(135deg,#1e1428,#120c1a);} .s2 .bs-tag{color:var(--purple);}
.s3{background:linear-gradient(135deg,#1e1808,#100e00);} .s3 .bs-tag{color:var(--orange);}
.bdots{display:flex;gap:6px;justify-content:center;margin-top:12px;}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .3s;}
.bdot.active{width:20px;border-radius:3px;background:var(--blue);}

.auth-wrap{width:100%;max-width:520px;padding:0 20px;}
.auth-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.auth-logo{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;letter-spacing:2px;text-align:center;padding-top:22px;}
.auth-logo span{color:var(--blue);}
.auth-sub{font-size:12px;color:var(--t3);text-align:center;margin-top:4px;margin-bottom:4px;padding-bottom:0;}
.a-tabs{display:flex;border-bottom:1px solid var(--border);margin-top:14px;}
.a-tab{flex:1;padding:13px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--t3);transition:all .2s;}
.a-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.a-forms{padding:22px;}
.fg{margin-bottom:13px;}
.fl{font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.5px;display:block;margin-bottom:5px;text-transform:uppercase;}
.fi{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-size:14px;font-family:'Inter',sans-serif;transition:border-color .2s;outline:none;}
.fi:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--t3);}
.av-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
.av-opt{width:40px;height:40px;border-radius:8px;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;}
.av-opt:hover,.av-opt.sel{border-color:var(--blue);background:rgba(26,159,255,.1);}
.a-err{font-size:12px;color:var(--red);min-height:16px;text-align:center;margin-top:4px;}
.btn-auth{width:100%;padding:12px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#1a9fff,#0f6dbf);color:#fff;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;margin-top:6px;transition:all .2s;}
.btn-auth:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,159,255,.35);}
.demo-link{text-align:center;margin-top:10px;font-size:12px;color:var(--t3);}
.demo-link a{color:var(--blue);cursor:pointer;}

/* ── CAT SELECT ── */
#catSel{position:fixed;inset:0;z-index:998;display:none;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(26,159,255,.07),transparent 70%),var(--bg);overflow-y:auto;}
.cs-box{width:100%;max-width:640px;padding:24px 20px;}
.cs-head{text-align:center;margin-bottom:24px;}
.cs-step{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:10px;}
.cs-title{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;margin-bottom:8px;}
.cs-sub{font-size:13px;color:var(--t2);max-width:400px;margin:0 auto;}
.csg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px;}
.csg-item{padding:20px 16px;border-radius:12px;background:var(--panel);border:2px solid var(--border);cursor:pointer;transition:all .25s;position:relative;display:flex;align-items:center;gap:14px;}
.csg-item:hover{transform:translateY(-2px);}
.csg-item.sel{transform:translateY(-2px);}
.csg-item.sel .csg-check{opacity:1;}
.csg-check{position:absolute;top:10px;right:12px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;opacity:0;transition:opacity .2s;}
.csg-emo{font-size:36px;flex-shrink:0;}
.csg-txt{}
.csg-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.csg-desc{font-size:11px;color:var(--t2);}
.csg-members{font-size:10px;font-weight:600;margin-top:5px;}
.cs-foot{display:flex;align-items:center;justify-content:space-between;}
.cs-count{font-size:13px;color:var(--t2);}
.cs-count b{color:var(--t1);}
.btn-cs{padding:13px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(135deg,#1a9fff,#0f6dbf);color:#fff;box-shadow:0 4px 16px rgba(26,159,255,.3);transition:all .2s;}
.btn-cs:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 24px rgba(26,159,255,.45);}
.btn-cs:disabled{opacity:.35;cursor:not-allowed;}

/* ── LEAGUE HERO BANNER (on app load) ── */
#leagueHero{display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);}
.lh-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:90%;max-width:420px;text-align:center;position:relative;overflow:hidden;}
.lh-card::before{content:'';position:absolute;inset:0;border-radius:20px;pointer-events:none;}
.lh-eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--t3);margin-bottom:16px;font-weight:600;}
.lh-cat{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.lh-avatar{font-size:52px;margin-bottom:10px;filter:drop-shadow(0 0 16px currentColor);}
.lh-name{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;margin-bottom:4px;}
.lh-hrs{font-family:'Rajdhani',sans-serif;font-size:48px;font-weight:700;line-height:1;margin-bottom:4px;}
.lh-hrs-lbl{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:20px;}
.lh-streak{font-size:14px;color:var(--orange);margin-bottom:6px;font-weight:600;}
.lh-msg{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:22px;}
.lh-gap{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;margin-bottom:20px;}
.lh-gap-lbl{font-size:11px;color:var(--t2);display:block;margin-top:2px;}
.lh-actions{display:flex;gap:10px;}
.lh-btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;text-transform:uppercase;transition:all .2s;}
.lh-btn-go{background:var(--blue);color:#fff;}
.lh-btn-go:hover{background:#0f8de8;transform:translateY(-1px);}
.lh-btn-skip{background:var(--card);color:var(--t2);border:1px solid var(--border);}
.lh-btn-skip:hover{color:var(--t1);}

/* ── NAV ── */
.nav{background:rgba(13,17,23,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
.nav-logo span{color:var(--blue);}
.nav-links{display:flex;gap:6px;align-items:center;}
.nb{padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--t2);transition:all .2s;}
.nb:hover{color:var(--t1);background:var(--hover);}
.nb-p{background:var(--blue)!important;color:#fff!important;font-weight:600!important;}
.nb-p:hover{background:#0f8de8!important;transform:translateY(-1px);}
.nav-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .2s;}
.nav-user:hover{background:var(--hover);}
.nav-av{width:28px;height:28px;border-radius:6px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--blue);}

/* ── PROFILE HEADER ── */
.ph{background:var(--panel);border-bottom:1px solid var(--border);padding:0;position:relative;overflow:hidden;}
.ph-cover{height:80px;background:linear-gradient(135deg,#0d1f35 0%,#0d1117 40%,#12082a 100%);position:relative;overflow:hidden;}
.ph-cover::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 120% at 30% 60%,rgba(26,159,255,.18),transparent 65%),radial-gradient(ellipse 40% 80% at 80% 30%,rgba(188,140,255,.1),transparent 60%);}
.ph-in{max-width:1160px;margin:0 auto;padding:0 24px;}
.ph-top{display:flex;align-items:flex-end;gap:18px;margin-top:-40px;padding-bottom:14px;position:relative;z-index:2;}
.av-wr{position:relative;flex-shrink:0;}
.avatar{width:80px;height:80px;border-radius:14px;background:linear-gradient(135deg,#1a3a5c,#0d1f35);border:3px solid var(--panel);display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 4px 20px rgba(0,0,0,.5);cursor:pointer;transition:transform .2s,box-shadow .2s;overflow:hidden;}
.avatar:hover{transform:scale(1.04);box-shadow:0 6px 28px rgba(26,159,255,.4);}
.av-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:var(--green);border:2px solid var(--panel);border-radius:50%;box-shadow:0 0 6px var(--green);}
.ph-info{flex:1;padding-bottom:4px;min-width:0;}
.ph-name{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;letter-spacing:.5px;line-height:1;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ph-title{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 9px;border-radius:20px;background:rgba(26,159,255,.12);color:var(--blue);border:1px solid rgba(26,159,255,.25);margin-bottom:8px;}
.ph-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.mi{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:3px;}
.ph-acts{padding-bottom:4px;align-self:flex-end;display:flex;gap:6px;flex-shrink:0;}
.btn-ol{padding:6px 13px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.btn-ol:hover{border-color:var(--blue);color:var(--blue);background:rgba(26,159,255,.07);}
.ph-tabs{display:flex;border-top:1px solid var(--border-l);overflow-x:auto;scrollbar-width:none;}
.ph-tabs::-webkit-scrollbar{display:none;}
.stab{padding:13px 16px;font-size:12px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-weight:500;letter-spacing:.2px;display:flex;align-items:center;gap:6px;}
.stab:hover{color:var(--t1);background:var(--hover);}
.stab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
.stab span{font-size:16px;line-height:1;}

/* ── LAYOUT ── */
.main{max-width:1160px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 300px;gap:20px;}
.tc{display:none;} .tc.active{display:block;}

/* ── CARDS ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.card:last-child{margin-bottom:0;}
.ch{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ct{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t2);}
.cb{padding:18px;}

/* ── DASHBOARD ── */
.dash-period{display:flex;background:var(--card);border-radius:8px;padding:3px;gap:2px;}
.dp-btn{flex:1;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--t3);transition:all .2s;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.dp-btn.active{background:var(--panel);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.3);}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;align-items:stretch;}
.kpi{background:var(--card);border:1px solid var(--border-l);border-radius:10px;padding:14px 12px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;min-height:90px;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-val{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;line-height:1;margin-bottom:3px;}
.kpi-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;line-height:1.3;}
.kpi-delta{font-size:11px;font-weight:600;margin-top:6px;}
.kpi-delta.up{color:var(--green);}
.kpi-delta.dn{color:var(--red);}
.kpi-delta.neu{color:var(--t3);}

/* bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:0;height:160px;margin-top:4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:0;position:relative;}
.bar-fill{width:calc(100% - 6px);border-radius:4px 4px 0 0;transition:height .6s cubic-bezier(.4,0,.2,1);min-height:2px;position:relative;cursor:pointer;}
.bar-fill:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);color:var(--t1);font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;white-space:nowrap;z-index:10;pointer-events:none;}
.bar-lbl{font-size:10px;color:var(--t3);margin-top:5px;text-align:center;}
.bar-axis{display:flex;justify-content:space-between;margin-top:2px;}
.bar-axis span{font-size:10px;color:var(--t3);}

/* stacked legend */
.chart-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;}
.cl-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);}
.cl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* radar / category breakdown */
.cat-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cbd-item{background:var(--card);border:1px solid var(--border-l);border-radius:10px;padding:14px;}
.cbd-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cbd-icon{font-size:24px;}
.cbd-name{font-size:13px;font-weight:600;}
.cbd-hrs{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;}
.cbd-hrs small{font-size:11px;font-weight:400;color:var(--t3);font-family:'Inter',sans-serif;margin-left:2px;}
.cbd-bar-wr{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:6px;}
.cbd-bar{height:100%;border-radius:2px;transition:width .8s ease;}
.cbd-vs{font-size:11px;color:var(--t3);}
.cbd-vs b{font-weight:600;}

/* streak calendar */
.streak-cal{display:flex;gap:3px;flex-wrap:wrap;}
.sc-day{width:20px;height:20px;border-radius:4px;background:var(--card);position:relative;cursor:pointer;transition:transform .15s;}
.sc-day:hover{transform:scale(1.2);}
.sc-day[data-l="1"]{background:#0e4429;}
.sc-day[data-l="2"]{background:#006d32;}
.sc-day[data-l="3"]{background:#26a641;}
.sc-day[data-l="4"]{background:#39d353;}
.sc-day-lbl{font-size:10px;color:var(--t3);margin-bottom:6px;}

/* best day card */
.insight-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.insight{background:var(--card);border:1px solid var(--border-l);border-radius:10px;padding:14px;text-align:center;}
.insight-val{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;}
.insight-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;}

/* ── CATS ── */
.cats{display:flex;flex-direction:column;gap:9px;}
.cat-item{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);border:1px solid var(--border-l);border-radius:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.cat-item::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;opacity:0;transition:opacity .2s;}
.cat-item:hover{background:var(--hover);border-color:var(--border);}
.cat-item:hover::before{opacity:1;}
.ci-box{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.ci-sub{font-size:10px;color:var(--t3);margin-bottom:4px;}
.ci-bar-wr{height:3px;background:var(--bg);border-radius:2px;overflow:hidden;}
.ci-bar{height:100%;border-radius:2px;transition:width 1s ease;}
.ci-hrs{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;text-align:right;line-height:1;}
.ci-hrs small{display:block;font-size:10px;font-weight:400;color:var(--t3);font-family:'Inter',sans-serif;}

/* ── LEAGUES ── */
.lg-section{margin-bottom:20px;}
.lg-head{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--panel);border:1px solid var(--border);border-radius:10px 10px 0 0;border-bottom:none;}
.lg-cat-icon{font-size:26px;}
.lg-cat-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;}
.lg-badge{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:700;margin-left:auto;}
.lg-body{background:var(--panel);border:1px solid var(--border);border-radius:0 0 10px 10px;overflow:hidden;}
.lg-row{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--border-l);transition:background .2s;}
.lg-row:last-child{border-bottom:none;}
.lg-row:hover{background:var(--hover);}
.lg-row.me{background:rgba(26,159,255,.05);border-left:3px solid var(--blue);}
.lr-rank{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;width:26px;text-align:center;flex-shrink:0;}
.lr-av{width:30px;height:30px;border-radius:6px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.lr-info{flex:1;}
.lr-name{font-size:12px;font-weight:600;}
.lr-streak{font-size:10px;color:var(--t3);}
.lr-bar-wr{width:70px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
.lr-bar{height:100%;border-radius:2px;}
.lr-hrs{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--t2);min-width:44px;text-align:right;}

/* ── MANAGE ── */
.mg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.mg-item{padding:16px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:all .22s;background:var(--card);position:relative;display:flex;align-items:center;gap:12px;}
.mg-item:hover{transform:translateY(-2px);}
.mg-item.on{border-color:currentColor;}
.mg-item.on .mg-check{opacity:1;}
.mg-check{position:absolute;top:8px;right:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;opacity:0;transition:opacity .2s;}
.mg-emo{font-size:26px;flex-shrink:0;}
.mg-txt{flex:1;}
.mg-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.mg-members{font-size:10px;color:var(--t3);}

/* ── TIMER (sidebar) ── */
.timer-panel{background:linear-gradient(135deg,#0d2137,#1a3a55);border:1px solid rgba(26,159,255,.3);border-radius:12px;padding:18px;text-align:center;margin-bottom:16px;}
.t-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:9px;font-weight:600;}
.t-cats{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
.tc-b{padding:4px 9px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t3);transition:all .2s;}
.tc-b:hover{color:var(--t1);}
.tc-b.sel{border-color:var(--blue);color:var(--blue);background:rgba(26,159,255,.1);}
.t-disp{font-family:'Rajdhani',sans-serif;font-size:48px;font-weight:700;color:var(--t1);letter-spacing:4px;line-height:1;margin:8px 0;text-shadow:0 0 20px rgba(26,159,255,.18);}
.t-disp.run{color:var(--blue);}
.t-sbtn{width:100%;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;letter-spacing:1px;text-transform:uppercase;transition:all .2s;font-family:'Rajdhani',sans-serif;}
.t-sbtn.idle{background:linear-gradient(135deg,#1a9fff,#0f6dbf);color:#fff;box-shadow:0 4px 14px rgba(26,159,255,.2);}
.t-sbtn.idle:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,159,255,.38);}
.t-sbtn.active{background:linear-gradient(135deg,#f85149,#c0392b);color:#fff;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 4px 15px rgba(248,81,73,.3);}50%{box-shadow:0 4px 25px rgba(248,81,73,.5);}}
.t-note{font-size:11px;color:var(--t3);margin-top:8px;}

/* ── TOTALS SIDEBAR ── */
.tot-wr{text-align:center;padding:18px 12px;}
.tot-num{font-family:'Rajdhani',sans-serif;font-size:54px;font-weight:700;line-height:1;text-shadow:0 0 28px rgba(26,159,255,.14);}
.tot-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;margin-top:3px;}
.tot-div{height:1px;background:var(--border);margin:10px 0;}
.tot-streak{font-size:12px;color:var(--orange);display:flex;align-items:center;justify-content:center;gap:5px;font-weight:600;}
.tot-week{font-size:11px;color:var(--green);display:flex;align-items:center;justify-content:center;gap:4px;margin-top:4px;}

/* ── SESSIONS ── */
.sl{display:flex;flex-direction:column;gap:4px;}
.si{display:flex;align-items:center;gap:11px;padding:10px 12px;background:var(--card);border-radius:8px;transition:background .2s;}
.si:hover{background:var(--hover);}
.sd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sc{font-size:12px;font-weight:600;flex:1;}
.sdur{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;}
.sdate{font-size:11px;color:var(--t3);min-width:72px;text-align:right;}

/* ── OVERLAYS ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.ov.show{opacity:1;pointer-events:all;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:26px;width:90%;max-width:440px;transform:scale(.95) translateY(10px);transition:transform .3s;}
.ov.show .modal{transform:scale(1) translateY(0);}
.mt{font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:700;margin-bottom:4px;}
.ms{font-size:13px;color:var(--t2);margin-bottom:16px;}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.mb{padding:11px;border-radius:8px;background:var(--card);border:2px solid var(--border);cursor:pointer;text-align:center;transition:all .2s;font-size:12px;font-weight:600;color:var(--t2);}
.mb:hover{border-color:var(--t2);color:var(--t1);}
.mb.sel{border-color:var(--blue);color:var(--t1);}
.mbi{font-size:20px;display:block;margin-bottom:4px;}
.m-timer{font-family:'Rajdhani',sans-serif;font-size:60px;font-weight:700;text-align:center;color:var(--blue);letter-spacing:6px;text-shadow:0 0 28px rgba(26,159,255,.4);margin:8px 0;}
.ma{display:flex;gap:10px;}
.btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.btn-p{background:var(--blue);color:#fff;}
.btn-p:hover{background:#0f8de8;}
.btn-d{background:var(--red);color:#fff;}
.btn-g{background:var(--card);color:var(--t2);border:1px solid var(--border);}
.btn-g:hover{color:var(--t1);}

/* ── ACH ── */
.ai{display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 5px;background:var(--card);border:1px solid var(--border-l);border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;position:relative;}
.ai:hover:not(.locked){background:var(--hover);transform:translateY(-2px);}
.ai.locked{opacity:.25;filter:grayscale(1);}
.ai-icon{font-size:22px;position:relative;}
.ai-dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--green);border:1.5px solid var(--card);border-radius:50%;}
.ai-name{font-size:10px;font-weight:600;color:var(--t2);line-height:1.3;}
.ai:not(.locked) .ai-name{color:var(--t1);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid var(--green);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;transform:translateY(80px);opacity:0;transition:all .4s cubic-bezier(.175,.885,.32,1.275);z-index:600;max-width:290px;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ach{border-color:var(--orange);}

.empty{text-align:center;padding:24px;color:var(--t3);font-size:13px;}

@media(max-width:900px){.main{grid-template-columns:1fr;}.kpi-row{grid-template-columns:repeat(2,1fr);}.cat-breakdown{grid-template-columns:1fr 1fr;}}
